<!DOCTYPE html>
<html>
<head>
    <title>Pilgrims Tracker - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-purple-600 to-blue-600 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-lg shadow-xl p-8 w-96">
        <div class="text-center mb-6">
            <div class="text-5xl mb-2">🕋</div>
            <h1 class="text-2xl font-bold">Pilgrims Tracker</h1>
            <p class="text-gray-600">Login to your account</p>
        </div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded mb-3" required>
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded mb-4" required>
            <button type="submit" class="w-full bg-purple-600 text-white p-3 rounded hover:bg-purple-700">Login</button>
        </form>

        <p class="text-center mt-4">Don't have an account? <a href="/register" class="text-purple-600">Register</a></p>
        <div class="mt-4 p-2 bg-blue-100 rounded text-center text-sm">
            Admin: admin@pilgrims.com / admin123
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const response = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const result = await response.json();
            if (result.success) window.location.href = result.redirect;
            else alert(result.message);
        };
    </script>
</body>
</html>
